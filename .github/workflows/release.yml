name: Release

# Crea automaticamente una "Release" (pagina con pulsante di download) SENZA
# bisogno di pushare tag manualmente. Si attiva in due modi:
#  1. quando il file VERSION cambia su main (ogni nuova versione = bump di VERSION);
#  2. manualmente dal pulsante "Run workflow" (workflow_dispatch).
# Il tag vX.Y.Z viene creato dalla release stessa, a partire dal contenuto di VERSION.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "VERSION"

permissions:
  contents: write   # necessario per creare tag e release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Leggi versione da VERSION
        id: v
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Crea la Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.v.outputs.version }}"
          name: "Assisto v${{ steps.v.outputs.version }}"
          generate_release_notes: true
          body: |
            Gestionale OEPAC — versione v${{ steps.v.outputs.version }}.

            ## Come scaricare e avviare
            1. Scarica **Source code (zip)** qui sotto.
            2. Estrai lo ZIP in una cartella.
            3. Windows: doppio click su **avvia.bat**. macOS/Linux: **./run.sh**.

            I tuoi dati (`gestionale.db`) restano nella tua cartella e non vengono toccati.
