name: Release

# Crea automaticamente una "Release" (pagina con pulsante di download) leggendo
# il numero di versione dal file VERSION. Il workflow gira ad ogni push su main,
# ma crea la release SOLO se non esiste gia' una release per quella versione:
# quindi per pubblicare una nuova versione basta incrementare il file VERSION.
# (Nessun push di tag manuale: il tag vX.Y.Z lo crea la release stessa.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # necessario per creare tag e release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Leggi versione da VERSION
        id: v
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: La release esiste gia'?
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.v.outputs.version }}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Crea la Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.v.outputs.version }}"
          name: "Assisto v${{ steps.v.outputs.version }}"
          generate_release_notes: true
          body: |
            Gestionale OEPAC — versione v${{ steps.v.outputs.version }}.

            ## Come scaricare e avviare
            1. Scarica **Source code (zip)** qui sotto.
            2. Estrai lo ZIP in una cartella.
            3. Windows: doppio click su **avvia.bat**. macOS/Linux: **./run.sh**.

            I tuoi dati (`gestionale.db`) restano nella tua cartella e non vengono toccati.
