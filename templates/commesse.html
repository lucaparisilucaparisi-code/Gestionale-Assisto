{% extends "base.html" %}

{% block title %}Gestione Commesse - Gestionale OEPAC{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-row">
        <div>
            <h1 class="page-title">Gestione Commesse</h1>
            <p class="page-subtitle">Crea e gestisci le commesse del servizio</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openModal('modal-nuova-commessa')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                Nuova Commessa
            </button>
        </div>
    </div>
</div>

<!-- Lista Commesse -->
<div class="card">
    <div class="card-header">
        <h2 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Commesse Attive
        </h2>
        <span class="badge badge-primary" id="count-badge">0 commesse</span>
    </div>
    <div class="card-body" id="commesse-container">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>
</div>

<!-- Modal Nuova Commessa -->
<div class="modal-overlay" id="modal-nuova-commessa">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title">Nuova Commessa</h3>
            <button class="modal-close" onclick="closeModal('modal-nuova-commessa')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Nome Commessa *</label>
                <input type="text" id="new-nome" class="form-control" placeholder="es. OEPAC VI">
            </div>

            <div class="form-group">
                <label class="form-label">Descrizione</label>
                <input type="text" id="new-descrizione" class="form-control" placeholder="es. Commessa OEPAC VI Municipio">
            </div>

            <div class="form-group">
                <label class="form-label">Colore</label>
                <div class="flex gap-2" style="flex-wrap: wrap;">
                    <button class="color-btn active" data-color="#0A84FF" style="background: #0A84FF;"></button>
                    <button class="color-btn" data-color="#BF5AF2" style="background: #BF5AF2;"></button>
                    <button class="color-btn" data-color="#30D158" style="background: #30D158;"></button>
                    <button class="color-btn" data-color="#FF9F0A" style="background: #FF9F0A;"></button>
                    <button class="color-btn" data-color="#FF453A" style="background: #FF453A;"></button>
                    <button class="color-btn" data-color="#64D2FF" style="background: #64D2FF;"></button>
                </div>
                <input type="hidden" id="new-colore" value="#0A84FF">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modal-nuova-commessa')">Annulla</button>
            <button class="btn btn-primary" onclick="createCommessa()">Crea Commessa</button>
        </div>
    </div>
</div>

<!-- Modal Modifica Commessa -->
<div class="modal-overlay" id="modal-modifica-commessa">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title">Modifica Commessa</h3>
            <button class="modal-close" onclick="closeModal('modal-modifica-commessa')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-id">

            <div class="form-group">
                <label class="form-label">Nome Commessa *</label>
                <input type="text" id="edit-nome" class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">Descrizione</label>
                <input type="text" id="edit-descrizione" class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">Colore</label>
                <div class="flex gap-2 edit-colors" style="flex-wrap: wrap;">
                    <button class="color-btn" data-color="#0A84FF" style="background: #0A84FF;"></button>
                    <button class="color-btn" data-color="#BF5AF2" style="background: #BF5AF2;"></button>
                    <button class="color-btn" data-color="#30D158" style="background: #30D158;"></button>
                    <button class="color-btn" data-color="#FF9F0A" style="background: #FF9F0A;"></button>
                    <button class="color-btn" data-color="#FF453A" style="background: #FF453A;"></button>
                    <button class="color-btn" data-color="#64D2FF" style="background: #64D2FF;"></button>
                </div>
                <input type="hidden" id="edit-colore">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('modal-modifica-commessa')">Annulla</button>
            <button class="btn btn-primary" onclick="updateCommessa()">Salva Modifiche</button>
        </div>
    </div>
</div>

<style>
.color-btn {
    width: 36px;
    height: 36px;
    border: 3px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
}
.color-btn:hover {
    transform: scale(1.1);
}
.color-btn.active {
    border-color: var(--text-primary);
    box-shadow: 0 0 0 2px var(--bg-primary);
}
.commessa-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    border-bottom: 1px solid var(--border-color);
    transition: background-color 0.2s ease;
}
.commessa-item:last-child {
    border-bottom: none;
}
.commessa-item:hover {
    background: var(--bg-tertiary);
}
.commessa-color {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: white;
    font-size: 1.2rem;
    flex-shrink: 0;
}
.commessa-info {
    flex: 1;
    min-width: 0;
}
.commessa-nome {
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text-primary);
}
.commessa-desc {
    color: var(--text-tertiary);
    font-size: 0.85rem;
    margin-top: 2px;
}
.commessa-stats {
    display: flex;
    gap: 24px;
    color: var(--text-secondary);
    font-size: 0.85rem;
}
.commessa-stat {
    display: flex;
    align-items: center;
    gap: 6px;
}
.commessa-stat svg {
    width: 16px;
    height: 16px;
    opacity: 0.7;
}
.commessa-actions {
    display: flex;
    gap: 8px;
}
</style>
{% endblock %}

{% block scripts %}
<script>
let selectedColor = '#0A84FF';
let commesseMap = new Map(); // Mappa per memorizzare i dati delle commesse

document.addEventListener('DOMContentLoaded', () => {
    loadCommesse();

    // Color buttons
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const container = this.closest('.modal-body');
            container.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const input = container.querySelector('input[type="hidden"]');
            if (input) input.value = this.dataset.color;
        });
    });
});

async function loadCommesse() {
    try {
        const commesse = await apiCall('/api/commesse');
        renderCommesse(commesse);
    } catch (error) {
        showToast('Errore caricamento commesse', 'error');
    }
}

function renderCommesse(commesse) {
    const container = document.getElementById('commesse-container');
    document.getElementById('count-badge').textContent = `${commesse.length} commesse`;

    if (commesse.length === 0) {
        showEmptyState('commesse-container', 'Nessuna commessa',
            'Crea la tua prima commessa per iniziare');
        return;
    }

    // Popola la mappa per accesso rapido (usa Number per consistenza chiavi)
    commesseMap.clear();
    commesse.forEach(c => commesseMap.set(Number(c.id), c));

    // Escape HTML per visualizzazione sicura
    const escapeHtml = (str) => (str || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

    container.innerHTML = commesse.map(c => `
        <div class="commessa-item">
            <div class="commessa-color" style="background: ${escapeHtml(c.colore) || '#6366f1'}">
                ${escapeHtml(c.nome.substring(0, 2).toUpperCase())}
            </div>
            <div class="commessa-info">
                <div class="commessa-nome">${escapeHtml(c.nome)}</div>
                <div class="commessa-desc">${escapeHtml(c.descrizione) || 'Nessuna descrizione'}</div>
            </div>
            <div class="commessa-actions">
                <button class="btn btn-sm btn-secondary" onclick="openEditModal(${c.id})">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Modifica
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteCommessa(${c.id})">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        </div>
    `).join('');
}

async function createCommessa() {
    const nome = document.getElementById('new-nome').value.trim();
    const descrizione = document.getElementById('new-descrizione').value.trim();
    const colore = document.getElementById('new-colore').value;

    // Validazione client-side
    if (!nome) {
        const input = document.getElementById('new-nome');
        input.classList.add('error');
        FormValidator.showFieldError(input, 'Nome commessa obbligatorio');
        return;
    }
    if (nome.length > 100) {
        showToast('Nome commessa troppo lungo (max 100 caratteri)', 'error');
        return;
    }

    try {
        await apiCall('/api/commesse', {
            method: 'POST',
            body: JSON.stringify({ nome, descrizione, colore })
        });

        showToast('Commessa creata con successo', 'success');
        closeModal('modal-nuova-commessa');
        document.getElementById('new-nome').value = '';
        document.getElementById('new-descrizione').value = '';
        loadCommesse();
    } catch (error) {
        showToast(error.message, 'error');
    }
}

function openEditModal(id) {
    const commessa = commesseMap.get(Number(id));
    if (!commessa) {
        showToast('Commessa non trovata', 'error');
        return;
    }

    document.getElementById('edit-id').value = commessa.id;
    document.getElementById('edit-nome').value = commessa.nome;
    document.getElementById('edit-descrizione').value = commessa.descrizione || '';
    document.getElementById('edit-colore').value = commessa.colore || '#6366f1';

    // Set active color
    document.querySelectorAll('.edit-colors .color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color === commessa.colore);
    });

    openModal('modal-modifica-commessa');
}

async function updateCommessa() {
    const id = document.getElementById('edit-id').value;
    const nome = document.getElementById('edit-nome').value.trim();
    const descrizione = document.getElementById('edit-descrizione').value.trim();
    const colore = document.getElementById('edit-colore').value;

    if (!nome) {
        showToast('Nome commessa obbligatorio', 'error');
        return;
    }

    try {
        await apiCall(`/api/commesse/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ nome, descrizione, colore })
        });

        showToast('Commessa aggiornata', 'success');
        closeModal('modal-modifica-commessa');
        loadCommesse();
    } catch (error) {
        showToast(error.message, 'error');
    }
}

async function deleteCommessa(id) {
    const commessa = commesseMap.get(Number(id));
    if (!commessa) {
        showToast('Commessa non trovata', 'error');
        return;
    }

    showConfirmDialog(
        'Eliminare commessa?',
        `Stai per eliminare la commessa "${commessa.nome}". Questa azione disattivera' la commessa.`,
        async () => {
            try {
                await apiCall(`/api/commesse/${id}`, { method: 'DELETE' });
                showToast('Commessa eliminata con successo', 'success');
                loadCommesse();
            } catch (error) {
                showToast(error.message, 'error');
            }
        },
        { type: 'danger', confirmText: 'Elimina' }
    );
}
</script>
{% endblock %}
